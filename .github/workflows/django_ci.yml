name: Django Full CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'  # Daily midnight build
  workflow_dispatch:  # Manual trigger

env:
  DJANGO_SETTINGS_MODULE: student.settings
  DATABASE_URL: sqlite:///db.sqlite3

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      
      - name: Run migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate
      
      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage report
          coverage xml
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
  
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linters
        run: |
          pip install flake8 black isort
      
      - name: Check formatting with black
        run: |
          black . --check --diff
      
      - name: Check imports with isort
        run: |
          isort . --check --diff
      
      - name: Lint with flake8
        run: |
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build Docker image (example)
        run: |
          echo "Building Docker image for Django app"
          # docker build -t my-django-app:${{ github.sha }} .
      
      - name: Create build package
        run: |
          mkdir build
          cp -r student build/
          cp manage.py requirements.txt build/
          tar -czf django-build.tar.gz build/
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: django-build-artifact
          path: django-build.tar.gz

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to STAGING environment..."
          echo "Running staging deployment commands"
          echo "✅ Staging deployment complete!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://example.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "This is where you'd deploy to your actual server"
          echo "✅ Production deployment complete!"
      
      - name: Send notification
        run: |
          echo "📧 Sending deployment notification"
          echo "Deployment: ${{ github.repository }}@${{ github.ref_name }}"
          echo "Status: ✅ Successful"